<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>manthru_portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: rgb(0, 0, 33);
            color: white;
            font-family: 'Poppins', sans-serif;
        }

        nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 92px;
            background-color: rgb(39, 39, 79);
        }

        .left {
            font-size: 1.5rem;
        }

        nav ul {
            display: flex;
            justify-content: center;
        }

        nav ul li {
            list-style: none;
            margin: 0 23px;
        }

        nav ul li a {
            text-decoration: none;
            color: white;
        }

        nav ul li a:hover {
            color: aqua;
            font-size: 1.04rem;
        }

        .firstsection {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin: 80px 0;

        }

        .firstsection>div {
            width: 30%;


        }

        .leftsection {

            width: 34px;
            font-size: 3rem;

        }

        .rightsection img {
            width: 80%;
            margin: 114px;


        }

        .purple {
            color: blueviolet;
        }

        #element {
            color: blueviolet;
        }

        img {
            border-radius: 240px;
            display: block;

        }
    </style>
</head>

<body>
    <header>
        <nav>
            <div class="left">Welcome To My Portfolio</div>
            <div class="right">
                <ul>
                    <li><a href="">Home</a></li>
                    <li><a href="">About</a></li>
                    <li><a href="">Services</a></li>
                    <li><a href="">content</a></li>

                </ul>
            </div>
        </nav>
    </header>

    <main>
        <section class="firstsection">
            <div class="leftsection">
                Hi,My name is <span class="purple">Manthru</span>
                <div>and I Will become a</div>
                <span id="element"></span>


            </div>
            <div class="rightsection">
                <img src="images/bg.png.jpg" alt="">
            </div>
        </section>

        <section class="secondsection">
            <h2>
                this about me
            </h2>
        </section>
    </main>
    <script src="https://unpkg.com/typed.js@2.0.16/dist/typed.umd.js"></script>
    <!-- Setup and start animation! -->
    <script>
        var typed = new Typed('#element', {
            strings: ['Web Developer', 'game Designer', 'Softwer Developer','Entrepreneur'],
            typeSpeed: 50,
        });
    </script>

</body>

</html>
